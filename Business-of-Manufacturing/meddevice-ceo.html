<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedDevice CEO — The Business of Manufacturing</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* ── Design Tokens ─────────────────────────────────────── */
  :root {
    --teal:       #0d9488;
    --teal-dark:  #0f766e;
    --teal-light: #ccfbf1;
    --teal-faint: #f0fdfa;
    --slate:      #0f172a;
    --slate-700:  #334155;
    --slate-500:  #64748b;
    --slate-300:  #cbd5e1;
    --slate-100:  #f1f5f9;
    --slate-50:   #f8fafc;
    --white:      #ffffff;
    --amber:      #d97706;
    --amber-bg:   #fffbeb;
    --red:        #dc2626;
    --red-bg:     #fef2f2;
    --green:      #16a34a;
    --green-bg:   #f0fdf4;
    --purple:     #7c3aed;
    --purple-bg:  #f5f3ff;
    --radius:     8px;
    --radius-lg:  12px;
    --shadow:     0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    --shadow-md:  0 4px 12px rgba(0,0,0,.10);
  }

  /* ── Reset ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--slate-100);
    color: var(--slate);
    line-height: 1.55;
    min-height: 100vh;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Top Header ─────────────────────────────────────────── */
  #top-header {
    background: var(--slate);
    color: var(--white);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .logo-svg { flex-shrink: 0; }
  .header-title { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--slate-300); }
  .header-subtitle { font-size: 1.05rem; font-weight: 700; }
  .header-spacer { flex: 1; }
  .app-badge {
    background: var(--teal);
    color: #fff;
    font-size: .7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  /* ── Dashboard Bar ──────────────────────────────────────── */
  #dashboard {
    background: var(--white);
    border-bottom: 1px solid var(--slate-300);
    padding: 10px 24px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    align-items: stretch;
    flex-shrink: 0;
  }
  .dash-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    border-radius: var(--radius);
    min-width: 110px;
    flex: 1;
    background: var(--slate-50);
    border: 1px solid var(--slate-300);
  }
  .dash-label {
    font-size: .65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--slate-500);
    white-space: nowrap;
  }
  .dash-value {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--slate);
    margin-top: 2px;
    white-space: nowrap;
  }
  .dash-card.highlight { background: var(--teal-faint); border-color: var(--teal); }
  .dash-card.highlight .dash-value { color: var(--teal-dark); }
  .reg-risk-low  { color: var(--green)  !important; }
  .reg-risk-med  { color: var(--amber)  !important; }
  .reg-risk-high { color: var(--red)    !important; }

  /* ── Phase Track ────────────────────────────────────────── */
  #phase-track {
    background: var(--white);
    border-bottom: 1px solid var(--slate-300);
    padding: 10px 24px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .phase-step {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px 6px 0;
    font-size: .78rem;
    font-weight: 500;
    color: var(--slate-500);
    white-space: nowrap;
    cursor: default;
    position: relative;
  }
  .phase-step:not(:last-child)::after {
    content: '→';
    margin-left: 14px;
    color: var(--slate-300);
  }
  .phase-step.active { color: var(--teal-dark); font-weight: 700; }
  .phase-step.done   { color: var(--green); }
  .phase-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 800;
    background: var(--slate-300);
    color: var(--white);
    flex-shrink: 0;
  }
  .phase-step.active .phase-num { background: var(--teal); }
  .phase-step.done   .phase-num { background: var(--green); }

  /* ── Main Content ───────────────────────────────────────── */
  #main { flex: 1; padding: 28px 24px; max-width: 820px; margin: 0 auto; width: 100%; }

  /* ── Cards ──────────────────────────────────────────────── */
  .card {
    background: var(--white);
    border: 1px solid var(--slate-300);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--slate);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-sub {
    font-size: .82rem;
    color: var(--slate-500);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .section-header {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--slate);
    margin-bottom: 4px;
  }
  .section-sub {
    font-size: .85rem;
    color: var(--slate-500);
    margin-bottom: 20px;
  }

  /* ── Decision Options ───────────────────────────────────── */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border: 2px solid var(--slate-300);
    border-radius: var(--radius);
    background: var(--white);
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s, box-shadow .15s;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--teal);
    background: var(--teal-faint);
    box-shadow: 0 0 0 3px rgba(13,148,136,.08);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.selected {
    border-color: var(--teal);
    background: var(--teal-faint);
  }
  .option-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--slate-100);
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem; font-weight: 800;
    color: var(--slate-500);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option-btn.selected .option-letter { background: var(--teal); color: #fff; }
  .option-title { font-size: .88rem; font-weight: 700; color: var(--slate); display: block; }
  .option-detail { font-size: .78rem; color: var(--slate-500); margin-top: 3px; display: block; line-height: 1.45; }
  .option-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .tag {
    font-size: .67rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .tag-cost    { background: #fef3c7; color: #92400e; }
  .tag-risk    { background: #fee2e2; color: #991b1b; }
  .tag-speed   { background: #dcfce7; color: #166534; }
  .tag-quality { background: #ede9fe; color: #5b21b6; }
  .tag-neutral { background: var(--slate-100); color: var(--slate-700); }

  /* ── Explanation Panel ──────────────────────────────────── */
  .explanation {
    margin-top: 14px;
    padding: 14px 16px;
    background: var(--teal-faint);
    border-left: 3px solid var(--teal);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: .82rem;
    line-height: 1.55;
    color: var(--slate-700);
    display: none;
  }
  .explanation.visible { display: block; }
  .explanation strong { color: var(--teal-dark); }

  /* ── Alert / Info boxes ─────────────────────────────────── */
  .alert {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: .82rem;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .alert-info   { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
  .alert-warn   { background: var(--amber-bg); border: 1px solid #fcd34d; color: #92400e; }
  .alert-danger { background: var(--red-bg); border: 1px solid #fca5a5; color: #991b1b; }
  .alert-success{ background: var(--green-bg); border: 1px solid #86efac; color: #166534; }

  /* ── Buttons ────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 22px;
    border-radius: var(--radius);
    font-size: .85rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .1s;
    letter-spacing: .02em;
    text-decoration: none;
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .45; cursor: default; }
  .btn-primary  { background: var(--teal); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--teal-dark); }
  .btn-outline  { background: #fff; color: var(--teal); border: 2px solid var(--teal); }
  .btn-outline:hover:not(:disabled) { background: var(--teal-faint); }
  .btn-danger   { background: var(--red); color: #fff; }
  .btn-sm { padding: 6px 14px; font-size: .78rem; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }

  /* ── Charts ─────────────────────────────────────────────── */
  .chart-wrap { position: relative; height: 220px; margin-top: 14px; }
  .chart-wrap-tall { position: relative; height: 280px; margin-top: 14px; }

  /* ── Metric Grid ────────────────────────────────────────── */
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-top: 14px;
  }
  .metric-box {
    background: var(--slate-50);
    border: 1px solid var(--slate-300);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .metric-label { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--slate-500); }
  .metric-value { font-size: 1.15rem; font-weight: 800; color: var(--slate); margin-top: 3px; }
  .metric-note  { font-size: .72rem; color: var(--slate-500); margin-top: 2px; }
  .metric-good  { color: var(--green) !important; }
  .metric-warn  { color: var(--amber) !important; }
  .metric-bad   { color: var(--red)   !important; }

  /* ── Timeline / Turn display ────────────────────────────── */
  .turn-indicator {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .turn-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--slate-300);
  }
  .turn-dot.done   { background: var(--green); }
  .turn-dot.active { background: var(--teal); }

  /* ── Final Score ────────────────────────────────────────── */
  .score-table { width: 100%; border-collapse: collapse; font-size: .85rem; margin-top: 14px; }
  .score-table th { background: var(--slate-100); padding: 8px 12px; text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--slate-500); border-bottom: 1px solid var(--slate-300); }
  .score-table td { padding: 10px 12px; border-bottom: 1px solid var(--slate-100); vertical-align: middle; }
  .score-table tr:last-child td { border-bottom: none; }
  .score-pass { color: var(--green); font-weight: 700; }
  .score-fail { color: var(--red); font-weight: 700; }
  .verdict-banner {
    text-align: center;
    padding: 24px;
    border-radius: var(--radius-lg);
    margin-bottom: 20px;
  }
  .verdict-win  { background: var(--green-bg); border: 2px solid var(--green); }
  .verdict-lose { background: var(--red-bg); border: 2px solid var(--red); }
  .verdict-acq  { background: var(--purple-bg); border: 2px solid var(--purple); }
  .verdict-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
  .verdict-desc  { font-size: .88rem; color: var(--slate-700); }

  /* ── Debrief comparison ─────────────────────────────────── */
  .debrief-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .debrief-col {
    background: var(--slate-50);
    border: 1px solid var(--slate-300);
    border-radius: var(--radius);
    padding: 14px;
  }
  .debrief-col.actual { border-color: var(--teal); background: var(--teal-faint); }
  .debrief-col-title  { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--slate-500); margin-bottom: 8px; }
  .debrief-col.actual .debrief-col-title { color: var(--teal-dark); }
  .debrief-item { font-size: .78rem; color: var(--slate-700); margin-bottom: 4px; line-height: 1.4; }
  .debrief-item strong { color: var(--slate); }

  /* ── Splash / Intro ─────────────────────────────────────── */
  .splash {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 0;
  }
  .splash-logo { text-align: center; margin-bottom: 20px; }
  .splash h1 { font-size: 1.8rem; font-weight: 900; color: var(--slate); text-align: center; line-height: 1.2; margin-bottom: 8px; }
  .splash p  { font-size: .88rem; color: var(--slate-500); text-align: center; line-height: 1.6; margin-bottom: 14px; }
  .splash-facts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 20px 0;
  }
  .splash-fact {
    background: var(--slate-50);
    border: 1px solid var(--slate-300);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: .8rem;
    color: var(--slate-700);
  }
  .splash-fact strong { display: block; font-size: 1rem; font-weight: 800; color: var(--slate); }

  /* ── Divider ────────────────────────────────────────────── */
  .divider { border: none; border-top: 1px solid var(--slate-300); margin: 20px 0; }

  /* ── Responsive ─────────────────────────────────────────── */
  @media (max-width: 600px) {
    #dashboard { gap: 6px; }
    .dash-card { min-width: 80px; padding: 6px 8px; }
    .dash-value { font-size: .9rem; }
    #main { padding: 16px 12px; }
    .debrief-row { grid-template-columns: 1fr; }
  }

  /* ── Print ──────────────────────────────────────────────── */
  @media print {
    #top-header, #phase-track { display: none; }
    .btn { display: none; }
  }

  /* ── Utility ────────────────────────────────────────────── */
  .hidden { display: none !important; }
  .text-center { text-align: center; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .flex-gap { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .tag-group { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Top Header ── -->
  <header id="top-header">
    <svg class="logo-svg" aria-label="NovaTech Medical logo" viewBox="0 0 36 36" width="36" height="36" fill="none">
      <rect width="36" height="36" rx="8" fill="#0d9488"/>
      <path d="M8 18h4l3-7 5 14 4-10 3 3h4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="header-title">The Business of Manufacturing · App 4</div>
      <div class="header-subtitle">MedDevice CEO</div>
    </div>
    <div class="header-spacer"></div>
    <span class="app-badge">NovaTech Medical</span>
  </header>

  <!-- ── Dashboard Bar (hidden until game starts) ── -->
  <div id="dashboard" class="hidden">
    <div class="dash-card highlight">
      <span class="dash-label">Month</span>
      <span class="dash-value" id="db-month">1 / 36</span>
    </div>
    <div class="dash-card">
      <span class="dash-label">Cash Remaining</span>
      <span class="dash-value" id="db-cash">$8.00M</span>
    </div>
    <div class="dash-card">
      <span class="dash-label">Est. Unit COGS</span>
      <span class="dash-value" id="db-cogs">—</span>
    </div>
    <div class="dash-card">
      <span class="dash-label">GM% @ $95 ASP</span>
      <span class="dash-value" id="db-gm">—</span>
    </div>
    <div class="dash-card">
      <span class="dash-label">Reg Risk</span>
      <span class="dash-value" id="db-reg">Low</span>
    </div>
    <div class="dash-card">
      <span class="dash-label">Phase</span>
      <span class="dash-value" id="db-phase">—</span>
    </div>
  </div>

  <!-- ── Phase Track (hidden until game starts) ── -->
  <div id="phase-track" class="hidden">
    <div class="phase-step" id="pt-1"><span class="phase-num">1</span>Design</div>
    <div class="phase-step" id="pt-2"><span class="phase-num">2</span>Regulatory</div>
    <div class="phase-step" id="pt-3"><span class="phase-num">3</span>Manufacturing</div>
    <div class="phase-step" id="pt-4"><span class="phase-num">4</span>Launch</div>
    <div class="phase-step" id="pt-5"><span class="phase-num">5</span>Scale-Up</div>
    <div class="phase-step" id="pt-end"><span class="phase-num">★</span>Results</div>
  </div>

  <!-- ── Main Content ── -->
  <main id="main"></main>

</div>

<script>
/* ════════════════════════════════════════════════════
   GAME STATE
   ════════════════════════════════════════════════════ */
const ASP = 95;   // Average Selling Price
const INITIAL_CASH = 8_000_000;
const LOH_OVERHEAD_BASE = 1_000_000; // annual factory overhead (base)

const state = {
  phase: 0,           // 0=splash, 1-5=phases, 6=results
  month: 1,
  cash: INITIAL_CASH,
  regRisk: 0,         // 0-10; 0-3 low, 4-6 med, 7+ high
  decisions: {},      // keyed by decision id
  // Derived
  unitCOGS: null,
  gmPct: null,
  launchMonth: null,
  launchVolume: null,
  supplyResilience: 0,
  // Phase 4 events resolved
  p4Events: [],
  p4Turn: 0,
  p4Revenue: 0,
  yearOneOpIncome: null,
};

/* ════════════════════════════════════════════════════
   DECISION DEFINITIONS
   ════════════════════════════════════════════════════ */
const DECISIONS = {

  /* ── Phase 1 ── */
  biosensor: {
    phase: 1, id: 'biosensor',
    title: 'Biosensor Component',
    context: 'The core sensing element determines accuracy and your supply chain dependencies.',
    options: [
      {
        key: 'A', label: 'Custom ASIC Chip',
        detail: 'Proprietary, high performance. 1 supplier. $14.00/unit.',
        tags: [['Quality','quality'],['High Cost','cost'],['Supply Risk','risk']],
        materialCost: 14.00, supplierCount: 1, regRiskDelta: 0,
        explanation: 'Custom ASICs give you best-in-class performance and IP protection — but single-source dependency is a serious supply chain vulnerability. One factory fire or quality hold can stop your production entirely.'
      },
      {
        key: 'B', label: 'Licensed Off-the-Shelf Module',
        detail: '$8.00/unit. 5 suppliers. Slight performance tradeoff.',
        tags: [['Lower Cost','cost'],['Multi-source','speed'],['Flexibility','quality']],
        materialCost: 8.00, supplierCount: 5, regRiskDelta: 0,
        explanation: 'Commodity sensor modules dramatically lower cost and give you negotiating leverage across 5 qualified suppliers. The slight performance gap vs. a custom ASIC rarely matters clinically for a CGM patch at this price point.'
      }
    ]
  },

  adhesive: {
    phase: 1, id: 'adhesive',
    title: 'Adhesive Backing',
    context: 'The adhesive keeps the patch on skin for 14 days — comfort and regulatory implications vary widely.',
    options: [
      {
        key: 'A', label: 'Medical-grade Acrylate',
        detail: 'Commodity. 3-day cure validation needed. $2.20/unit.',
        tags: [['Low Cost','cost'],['Proven','quality'],['Common Suppliers','speed']],
        materialCost: 2.20, supplierCount: 3, regRiskDelta: 0,
        explanation: 'Acrylate adhesives have decades of skin-contact safety data and broad supplier availability. The 3-day cure validation is a minor process step that is well understood by most CMOs.'
      },
      {
        key: 'B', label: 'Proprietary Hydrogel',
        detail: 'Custom formulation required. $5.10/unit. Superior wear comfort.',
        tags: [['High Cost','cost'],['IP Moat','quality'],['Custom Validation','risk']],
        materialCost: 5.10, supplierCount: 1, regRiskDelta: 1,
        explanation: 'Hydrogels can meaningfully improve patient comfort and reduce skin irritation complaints — but they require a custom formulation from a single supplier, specialized validation, and add regulatory complexity around biocompatibility testing.'
      }
    ]
  },

  encapsulation: {
    phase: 1, id: 'encapsulation',
    title: 'Electronics Encapsulation',
    context: 'Encapsulation protects the electronics from body moisture and mechanical stress during 14-day wear.',
    options: [
      {
        key: 'A', label: 'Custom Overmold',
        detail: '$200K tooling CapEx. $1.10/unit at scale. Excellent IP protection.',
        tags: [['CapEx','cost'],['Low Unit Cost','speed'],['IP Protection','quality']],
        materialCost: 1.10, capex: 200_000, supplierCount: 3, regRiskDelta: 0,
        explanation: 'Injection-molded overmolding locks in your form factor and is very cost-effective at volume. The $200K tooling investment pays back quickly once volume exceeds ~50K units/year. Changing the mold later is a significant engineering event.'
      },
      {
        key: 'B', label: 'Potting Compound',
        detail: 'No tooling required. $2.80/unit. Less elegant but fast to start.',

/* ════════════════════════════════════════════════════
   FINANCIAL CALCULATIONS
   ════════════════════════════════════════════════════ */
function calcUnitCOGS(vol) {
  const d = state.decisions;
  if (!d.biosensor || !d.adhesive || !d.encapsulation || !d.wireless || !d.assembly) return null;

  const materials =
    DECISIONS.biosensor.options.find(o=>o.key===d.biosensor).materialCost +
    DECISIONS.adhesive.options.find(o=>o.key===d.adhesive).materialCost +
    DECISIONS.encapsulation.options.find(o=>o.key===d.encapsulation).materialCost +
    DECISIONS.wireless.options.find(o=>o.key===d.wireless).materialCost;

  const asmOpt   = DECISIONS.assembly.options.find(o=>o.key===d.assembly);
  const stdHrs   = asmOpt.stdHrs;
  const DL_RATE  = 35; // $/hr direct labor

  // Overhead
  const annualOH = LOH_OVERHEAD_BASE + (d.qms ? DECISIONS.qms.options.find(o=>o.key===d.qms).setupCost * 0.15 : 0);
  const earnedHrs = (vol||150_000) * stdHrs;
  const ohRate   = annualOH / earnedHrs;
  const lohRate  = DL_RATE + ohRate;
  const laborOH  = lohRate * stdHrs;

  // QC cost
  const qcCost = d.qms ? DECISIONS.qms.options.find(o=>o.key===d.qms).qcUnitCost : 1.20;

  // CMO cost
  let cmoCost = 0;
  if (d.makeOrBuy) {
    const mobOpt = DECISIONS.makeOrBuy.options.find(o=>o.key===d.makeOrBuy);
    cmoCost = mobOpt.cmoUnitCost || 0;
    if (d.makeOrBuy === 'C') {
      // hybrid: half units via CMO
      cmoCost = mobOpt.cmoUnitCost * 0.5;
    }
  }

  // Supplier cost delta
  const supplierDelta = (d.supplierStrategy && d.supplierStrategy==='B') ? 0.80 : 0;

  const pkg         = 1.50;
  const sterilization= 2.20;
  const freightOut  = 1.80;

  const total = materials + laborOH + qcCost + cmoCost + supplierDelta + pkg + sterilization + freightOut;
  return Math.round(total * 100) / 100;
}

function calcGM(cogs) {
  if (cogs === null) return null;
  return Math.round(((ASP - cogs) / ASP) * 1000) / 10;
}

function calcScalabilityCOGS() {
  return [100_000, 500_000, 2_000_000].map(v => ({ vol: v, cogs: calcUnitCOGS(v) }));
}

function updateDashboard() {
  const cogs = calcUnitCOGS(state.launchVolume || 150_000);
  const gm   = calcGM(cogs);
  state.unitCOGS = cogs;
  state.gmPct    = gm;

  document.getElementById('db-month').textContent = `${state.month} / 36`;
  document.getElementById('db-cash').textContent  = formatMoney(state.cash);
  document.getElementById('db-cogs').textContent  = cogs !== null ? `$${cogs.toFixed(2)}` : '—';

  const gmEl = document.getElementById('db-gm');
  gmEl.textContent = gm !== null ? `${gm}%` : '—';
  gmEl.className   = 'dash-value ' + (gm === null ? '' : gm >= 58 ? 'metric-good' : gm >= 45 ? 'metric-warn' : 'metric-bad');

  const riskLabel = state.regRisk <= 3 ? 'Low' : state.regRisk <= 6 ? 'Medium' : 'High';
  const riskEl    = document.getElementById('db-reg');
  riskEl.textContent = riskLabel;
  riskEl.className   = 'dash-value ' + (state.regRisk <= 3 ? 'reg-risk-low' : state.regRisk <= 6 ? 'reg-risk-med' : 'reg-risk-high');

  const phaseNames = ['—','Design','Regulatory','Manufacturing','Launch','Scale-Up','Results'];
  document.getElementById('db-phase').textContent = phaseNames[state.phase] || '—';

  // Phase track
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById(`pt-${i}`);
    if (!el) continue;
    el.className = 'phase-step' + (i < state.phase ? ' done' : i === state.phase ? ' active' : '');
  }
  const endEl = document.getElementById('pt-end');
  if (endEl) endEl.className = 'phase-step' + (state.phase === 6 ? ' active' : '');
}

function formatMoney(n) {
  if (Math.abs(n) >= 1_000_000) return `$${(n/1_000_000).toFixed(2)}M`;
  if (Math.abs(n) >= 1_000)     return `$${(n/1_000).toFixed(1)}K`;
  return `$${n.toFixed(0)}`;
}

/* ─── Decision Card ─── */
function decisionCard(defId, onSelect) {
  const def  = DECISIONS[defId];
  const chosen = state.decisions[defId] || null;

  const optionsHTML = def.options.map(opt => {
    const isSelected = chosen === opt.key;
    const tagsHTML   = opt.tags.map(([label, cls]) => `<span class="tag tag-${cls}">${label}</span>`).join('');
    return `
      <button class="option-btn ${isSelected ? 'selected' : ''}"
              data-def="${defId}" data-key="${opt.key}"
              ${chosen ? 'disabled' : ''}>
        <span class="option-letter">${opt.key}</span>
        <div>
          <span class="option-title">${opt.label}</span>
          <span class="option-detail">${opt.detail}</span>
          <div class="option-tags mt-8">${tagsHTML}</div>
        </div>
      </button>`;
  }).join('');

  const expId = `exp-${defId}`;
  const expHTML = chosen ? (() => {
    const opt = def.options.find(o => o.key === chosen);
    return `<div class="explanation visible" id="${expId}"><strong>Why it matters:</strong> ${opt.explanation}</div>`;
  })() : `<div class="explanation" id="${expId}"></div>`;

  return `
    <div class="card" id="card-${defId}">
      <div class="card-title">${def.title}</div>
      <div class="card-sub">${def.context}</div>
      <div class="options-grid">${optionsHTML}</div>
      ${expHTML}
    </div>`;
}

function attachDecisionListeners(defIds, onAllDone) {
  defIds.forEach(defId => {
    document.querySelectorAll(`[data-def="${defId}"]`).forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        const def = DECISIONS[defId];
        const opt = def.options.find(o => o.key === key);

        state.decisions[defId] = key;

        // Apply cost / risk effects
        if (opt.regRiskDelta)  state.regRisk  = Math.max(0, state.regRisk + opt.regRiskDelta);
        if (opt.capex)         state.cash     -= opt.capex;
        if (opt.qualCost)      state.cash     -= opt.qualCost;
        if (opt.setupCost)     state.cash     -= opt.setupCost;
        if (opt.extraCost)     state.cash     -= opt.extraCost;
        if (opt.regCost)       state.cash     -= opt.regCost;
        if (opt.monthsAdded)   state.month    += opt.monthsAdded;

        updateDashboard();

        // Re-render just this card's buttons as locked + selected
        document.querySelectorAll(`[data-def="${defId}"]`).forEach(b => {
          b.disabled = true;
          if (b.dataset.key === key) b.classList.add('selected');
          else b.classList.remove('selected');
          b.querySelector('.option-letter').style.background = b.dataset.key === key ? 'var(--teal)' : '';
          b.querySelector('.option-letter').style.color      = b.dataset.key === key ? '#fff' : '';
        });

        // Show explanation
        const expEl = document.getElementById(`exp-${defId}`);
        if (expEl) {
          expEl.innerHTML = `<strong>Why it matters:</strong> ${opt.explanation}`;
          expEl.classList.add('visible');
        }

        if (onAllDone && defIds.every(id => state.decisions[id])) onAllDone();
      });
    });
  });
}

function renderScalabilityChart() {
  const data = calcScalabilityCOGS();
  const labels = data.map(d => d.vol >= 1_000_000 ? `${(d.vol/1_000_000).toFixed(1)}M` : `${(d.vol/1_000).toFixed(0)}K`);

  const metricsHTML = data.map((d, i) => `
    <div class="metric-box">
      <div class="metric-label">@ ${labels[i]} units/yr</div>
      <div class="metric-value">$${values[i].toFixed(2)}</div>

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Unit COGS ($)',
          data: values,
          backgroundColor: ['#0d9488cc','#0d9488aa','#0d9488'],
          borderRadius: 6,
          yAxisID: 'y'

        {
          label: 'GM%',
          data: gms,

          backgroundColor: 'transparent',

          tension: 0.3,
          yAxisID: 'y2'

    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top' } },
      scales: {
        y:  { title: { display: true, text: 'Unit COGS ($)' }, beginAtZero: false, grid: { color: '#f1f5f9' } },
        y2: { title: { display: true, text: 'GM%' }, position: 'right', min: 0, max: 100, grid: { drawOnChartArea: false } }

function renderCOGSBreakdown(totalCogs) {
  const d = state.decisions;
  const materials =
    DECISIONS.biosensor.options.find(o=>o.key===d.biosensor).materialCost +
    DECISIONS.adhesive.options.find(o=>o.key===d.adhesive).materialCost +
    DECISIONS.encapsulation.options.find(o=>o.key===d.encapsulation).materialCost +
    DECISIONS.wireless.options.find(o=>o.key===d.wireless).materialCost;

  const asmOpt  = DECISIONS.assembly.options.find(o=>o.key===d.assembly);
  const stdHrs  = asmOpt.stdHrs;
  const vol     = state.launchVolume || 150_000;
  const annualOH= LOH_OVERHEAD_BASE + DECISIONS.qms.options.find(o=>o.key===d.qms).setupCost * 0.15;
  const ohRate  = annualOH / (vol * stdHrs);
  const lohRate = 35 + ohRate;
  const laborOH = lohRate * stdHrs;

  const qcCost  = DECISIONS.qms.options.find(o=>o.key===d.qms).qcUnitCost;
  const mobOpt  = DECISIONS.makeOrBuy.options.find(o=>o.key===d.makeOrBuy);
  let cmoCost   = mobOpt.cmoUnitCost || 0;
  if (d.makeOrBuy === 'C') cmoCost *= 0.5;
  const supDelta= d.supplierStrategy === 'B' ? 0.80 : 0;
  const other   = 1.50 + 2.20 + 1.80; // pkg + sterilization + freight

  const ctx = document.getElementById('chart-cogs-breakdown').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Materials','Labor & OH','QC','CMO Fee','Supplier Delta','Pkg/Steril/Freight'],
      datasets: [{
        label: '$/unit',
        data: [materials, laborOH, qcCost, cmoCost, supDelta, other].map(v => Math.round(v*100)/100),
        backgroundColor: ['#0d9488','#0f766e','#7c3aed','#d97706','#dc2626','#64748b'],
        borderRadius: 5
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false }, title: { display: true, text: 'Unit COGS Breakdown ($/unit)' } },
      scales: { x: { beginAtZero: true, grid: { color: '#f1f5f9' } } }
    }
  });
}

    <div class="metric-box">
      <div class="metric-label">Cash Remaining</div>
      <div class="metric-value metric-${state.cash>500_000?'good':state.cash>0?'warn':'bad'}">${formatMoney(state.cash)}</div>
    </div>`;

  document.getElementById('p4-fin-metrics').innerHTML = metricsHTML;

  // Waterfall-style revenue chart
  const ctx = document.getElementById('chart-p4-revenue').getContext('2d');
  const opex = qtrRev * 0.20; // ~20% opex estimate
  const opIncome = qtrGross - opex;
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Revenue','COGS','Gross Profit','OpEx (est.)','Op. Income'],
      datasets: [{
        data: [qtrRev, -qtrCOGS, qtrGross, -opex, opIncome],
        backgroundColor: [
          '#0d9488','#dc2626','#16a34a','#d97706',
          opIncome >= 0 ? '#16a34a' : '#dc2626'
        ],
        borderRadius: 5
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        title: { display: true, text: `Quarter ${turn+1} P&L Snapshot ($)` },
        tooltip: {
          callbacks: {
            label: ctx => formatMoney(Math.abs(ctx.raw)) + (ctx.raw < 0 ? ' (cost)' : '')
          }
        }
      },
      scales: { y: { grid: { color: '#f1f5f9' }, ticks: { callback: v => formatMoney(v) } } }
    }
  });

  document.getElementById('btn-p4-next').onclick = () => {
    state.p4Turn++;
    state.p4Events.push({ turn, eventId: state._p4Queue[turn].id });
    showPhase4Turn();
  };
}

/* ─── Phase 5: Scale-Up ─── */
function showPhase5() {
  state.phase = 5;
  state.month = 30;
  updateDashboard();

  const defId = 'scaleUp';
  const def   = DECISIONS[defId];

  // Contextual constraints based on prior decisions
  const hasManualAssembly   = state.decisions.assembly   === 'A';
  const hasTightTolerances  = state.decisions.biosensor  === 'A' && state.decisions.wireless === 'B';
  const hasCMO              = state.decisions.makeOrBuy  === 'B';
  const hasHighRegRisk      = state.regRisk >= 7;

  let constraintHTML = '';
  if (hasManualAssembly)  constraintHTML += `<div class="alert alert-warn">⚠️ <strong>Assembly constraint:</strong> You chose fully manual assembly in Phase 1. Scaling to 2M units requires a major automation investment on top of the scale-up CapEx.</div>`;
  if (hasTightTolerances) constraintHTML += `<div class="alert alert-warn">⚠️ <strong>Supplier constraint:</strong> Your custom ASIC and proprietary RF chip leave you with limited supplier pool for high-volume expansion.</div>`;
  if (hasCMO)             constraintHTML += `<div class="alert alert-success">✅ <strong>CMO advantage:</strong> Your existing CMO relationship makes rapid scale-up through their network faster and lower risk.</div>`;
  if (hasHighRegRisk)     constraintHTML += `<div class="alert alert-danger">🚨 <strong>Regulatory constraint:</strong> High regulatory risk score means any manufacturing changes may require 510(k) resubmission before implementation.</div>`;

  const optionsHTML = def.options.map(opt => `
    <button class="option-btn" data-def="${defId}" data-key="${opt.key}">
      <span class="option-letter">${opt.key}</span>
      <div>
        <span class="option-title">${opt.label}</span>
        <span class="option-detail">${opt.detail}</span>
        <div class="option-tags mt-8">${opt.tags.map(([l,c])=>`<span class="tag tag-${c}">${l}</span>`).join('')}</div>
      </div>
    </button>`).join('');

  render(`
    <div class="section-header">Phase 5 — Scale-Up Decision</div>
    <div class="section-sub">Month 30–36 · Investors have secured $3M in additional funding. Commercial traction is strong. Your earlier choices now constrain or expand your options.</div>

    <div class="alert alert-info">
      <strong>The ask:</strong> Scale from your current volume of ${(state.launchVolume/1000).toFixed(0)}K units/year to <strong>2,000,000 units/year</strong> over the next 24 months. You have $3M in new funding to deploy.
    </div>

    ${constraintHTML}

    <div class="card">
      <div class="card-title">${def.title}</div>
      <div class="card-sub">${def.context}</div>
      <div class="options-grid">${optionsHTML}</div>
      <div id="exp-${defId}" class="explanation"></div>
    </div>

    <div id="p5-cta" class="hidden"></div>`);

  document.querySelectorAll(`[data-def="${defId}"]`).forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      const opt = def.options.find(o=>o.key===key);
      state.decisions[defId] = key;
      state.cash -= opt.capex;
      state.cash += 3_000_000; // new funding
      state.month = 36;
      updateDashboard();

      document.querySelectorAll(`[data-def="${defId}"]`).forEach(b => {
        b.disabled = true;
        if (b.dataset.key === key) b.classList.add('selected');
      });
      const expEl = document.getElementById(`exp-${defId}`);
      expEl.innerHTML = `<strong>Why it matters:</strong> ${opt.explanation}`;
      expEl.classList.add('visible');

      const ctaEl = document.getElementById('p5-cta');
      ctaEl.classList.remove('hidden');
      ctaEl.innerHTML = `
        <div class="card">
          <div class="card-title">🚀 Scale-Up Plan Filed with Board</div>
          <div class="card-sub">Your 24-month growth plan has been accepted. Now let's see how the full simulation shakes out.</div>
          <div class="btn-row">
            <button class="btn btn-primary" id="btn-results">See Final Results & Debrief →</button>
          </div>
        </div>`;
      document.getElementById('btn-results').onclick = showResults;
      ctaEl.scrollIntoView({ behavior:'smooth', block:'start' });
    });
  });
}

/* ─── Final Results ─── */
function showResults() {
  state.phase = 6;
  updateDashboard();

  const cogs   = state.unitCOGS || calcUnitCOGS(state.launchVolume);
  const gm     = typeof state.gmPct === 'number' ? state.gmPct : calcGM(cogs);
  const vol    = state.launchVolume || 150_000;
  const annRev = vol * ASP;
  const annCOGS= vol * cogs;
  const annGross= annRev - annCOGS;
  const annOpex = annRev * 0.22;
  const opIncome= annGross - annOpex;

  // Scoring
  const resScore  = Math.min(100, (state.supplyResilience||0) + (state.decisions.supplierStrategy==='B'?30:0) + 30);
  const launchOK   = state.launchMonth <= 30;
  const gmOK       = gm >= 58;
  const opIncOK    = opIncome > 0;
  const regOK      = state.regRisk <= 3;
  const resOK      = resScore >= 65;
  const cashOK     = state.cash > 500_000;

  let score = 0;
  if (launchOK) score++; if (gmOK) score++; if (opIncOK) score++;
  if (regOK) score++;   if (resOK) score++;  if (cashOK) score++;

  let verdict, verdictClass, verdictDesc;
  if (score >= 5)          { verdict='Profitable Commercialization'; verdictClass='verdict-win'; verdictDesc='Outstanding. NovaTech is on a path to category leadership. Investors are celebrating.'; }
  else if (score >= 3)     { verdict='Unprofitable Launch'; verdictClass='verdict-lose'; verdictDesc='You made it to market but margins are under pressure. Restructuring required before Series B.'; }
  else if (state.cash > 0) { verdict='Failed to Launch'; verdictClass='verdict-lose'; verdictDesc='You ran out of time or margin. The company survives on remaining cash but needs a pivot.'; }
  else                     { verdict='Acquired'; verdictClass='verdict-acq'; verdictDesc='Cash ran out, but the product has real value. A strategic acquirer steps in. Not the exit you planned.'; }

  const passIcon = v => v ? '<span class="score-pass">✓ Pass</span>' : '<span class="score-fail">✗ Miss</span>';

  render(`
    <div class="section-header">Final Results — NovaTech Medical</div>
    <div class="section-sub">Here is how your 36-month simulation played out. Every row reflects a decision you made.</div>

    <div class="verdict-banner ${verdictClass}">
      <div class="verdict-title">${verdict}</div>
      <div class="verdict-desc">${verdictDesc}</div>
    </div>

    <div class="card">
      <div class="card-title">📊 Scorecard</div>
      <table class="score-table">
        <thead><tr><th>Metric</th><th>Your Result</th><th>Target</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td>Launch Timing</td><td>Month ${state.launchMonth || state.month}</td><td>≤ Month 30</td><td>${passIcon(launchOK)}</td></tr>
          <tr><td>Gross Margin</td><td>${typeof gm==='number'?gm.toFixed(1):gm}%</td><td>≥ 58%</td><td>${passIcon(gmOK)}</td></tr>
          <tr><td>Operating Income (Yr 1 est.)</td><td>${formatMoney(opIncome)}</td><td>Positive</td><td>${passIcon(opIncOK)}</td></tr>
          <tr><td>Regulatory Risk</td><td>${state.regRisk <= 3 ? 'Low' : state.regRisk <= 6 ? 'Medium' : 'High'} (${state.regRisk}/10)</td><td>Low (≤3)</td><td>${passIcon(regOK)}</td></tr>
          <tr><td>Supply Chain Resilience</td><td>${resScore}/100</td><td>≥ 65</td><td>${passIcon(resOK)}</td></tr>
          <tr><td>Cash Remaining</td><td>${formatMoney(state.cash)}</td><td>> $500K</td><td>${passIcon(cashOK)}</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title">💡 What-If Comparison</div>
      <div class="card-sub">How does your path compare to the two benchmark strategies?</div>
      <div class="debrief-row">
        <div class="debrief-col actual">
          <div class="debrief-col-title">Your Path</div>
          <div class="debrief-item"><strong>Biosensor:</strong> ${state.decisions.biosensor==='A'?'Custom ASIC':'Off-the-shelf'}</div>
          <div class="debrief-item"><strong>Pathway:</strong> ${state.decisions.pathway==='A'?'510(k)':'De Novo'}</div>
          <div class="debrief-item"><strong>Assembly:</strong> ${state.decisions.assembly==='A'?'Manual':state.decisions.assembly==='B'?'Semi-auto':'Fully auto'}</div>
          <div class="debrief-item"><strong>Make/Buy:</strong> ${state.decisions.makeOrBuy==='A'?'Internal':state.decisions.makeOrBuy==='B'?'CMO':'Hybrid'}</div>
          <div class="debrief-item"><strong>Supplier:</strong> ${state.decisions.supplierStrategy==='B'?'Dual-source':'Single-source'}</div>
          <div class="debrief-item"><strong>GM:</strong> ${typeof gm==='number'?gm.toFixed(1):gm}%</div>
          <div class="debrief-item"><strong>Launch Month:</strong> ${state.launchMonth || state.month}</div>
        </div>
        <div class="debrief-col">
          <div class="debrief-col-title">Optimal: Low Cost</div>
          <div class="debrief-item"><strong>Biosensor:</strong> Off-the-shelf ($8)</div>
          <div class="debrief-item"><strong>Pathway:</strong> 510(k)</div>
          <div class="debrief-item"><strong>Assembly:</strong> Semi-automated</div>
          <div class="debrief-item"><strong>Make/Buy:</strong> CMO (lower CapEx)</div>
          <div class="debrief-item"><strong>Supplier:</strong> Dual-source</div>
          <div class="debrief-item"><strong>GM (150K units):</strong> ~62%</div>
          <div class="debrief-item"><strong>Launch Month:</strong> ~22</div>
        </div>
        <div class="debrief-col">
          <div class="debrief-col-title">Optimal: Fast to Market</div>
          <div class="debrief-item"><strong>Biosensor:</strong> Off-the-shelf ($8)</div>
          <div class="debrief-item"><strong>Pathway:</strong> 510(k)</div>
          <div class="debrief-item"><strong>Assembly:</strong> Manual (no validation delay)</div>
          <div class="debrief-item"><strong>Make/Buy:</strong> CMO (3-month setup)</div>
          <div class="debrief-item"><strong>Supplier:</strong> Dual-source</div>
          <div class="debrief-item"><strong>GM (50K units):</strong> ~48%</div>
          <div class="debrief-item"><strong>Launch Month:</strong> ~18</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔍 Key Decision Review</div>
      <div class="card-sub">What drove your outcome — and what would have changed it.</div>
      ${buildDecisionReview()}
    </div>

    <div class="card">
      <div class="card-title">📈 Year 1 P&L Summary</div>
      <div class="metric-grid">
        <div class="metric-box"><div class="metric-label">Revenue</div><div class="metric-value">${formatMoney(annRev)}</div></div>
        <div class="metric-box"><div class="metric-label">COGS</div><div class="metric-value">${formatMoney(annCOGS)}</div></div>
        <div class="metric-box"><div class="metric-label">Gross Profit</div><div class="metric-value metric-${annGross>0?'good':'bad'}">${formatMoney(annGross)}</div></div>
        <div class="metric-box"><div class="metric-label">GM%</div><div class="metric-value metric-${gm>=58?'good':gm>=45?'warn':'bad'}">${typeof gm==='number'?gm.toFixed(1):gm}%</div></div>
        <div class="metric-box"><div class="metric-label">OpEx (est. 22%)</div><div class="metric-value">${formatMoney(annOpex)}</div></div>
        <div class="metric-box"><div class="metric-label">Operating Income</div><div class="metric-value metric-${opIncome>0?'good':'bad'}">${formatMoney(opIncome)}</div></div>
      </div>
      <div class="chart-wrap-tall"><canvas id="chart-final-pl"></canvas></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-outline" id="btn-print">🖨️ Print Results</button>
      <button class="btn btn-primary" id="btn-restart">↺ Play Again</button>
    </div>`);

  // Render final P&L chart
  const ctx = document.getElementById('chart-final-pl').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Annual Revenue','COGS','Gross Profit','OpEx','Operating Income'],
      datasets: [{
        data: [annRev, annCOGS, annGross, annOpex, opIncome],
        backgroundColor: ['#0d9488','#dc2626','#16a34a','#d97706', opIncome>=0?'#16a34a':'#dc2626'],
        borderRadius: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false}, title:{display:true,text:'Year 1 P&L (Annual)'}},
      scales: { y: { grid:{color:'#f1f5f9'}, ticks:{callback:v=>formatMoney(v)} } }
    }
  });

  document.getElementById('btn-print').onclick = () => window.print();
  document.getElementById('btn-restart').onclick = () => {
    // Reset state
    Object.keys(state).forEach(k => {
      if (k==='phase') state[k]=0;
      else if (k==='month') state[k]=1;
      else if (k==='cash') state[k]=INITIAL_CASH;
      else if (k==='regRisk') state[k]=0;
      else if (k==='decisions') state[k]={};
      else if (k==='unitCOGS'||k==='gmPct'||k==='launchMonth'||k==='yearOneOpIncome') state[k]=null;
      else if (k==='launchVolume') state[k]=null;
      else if (k==='supplyResilience') state[k]=0;
      else if (k==='p4Events') state[k]=[];
      else if (k==='p4Turn') state[k]=0;
      else if (k==='p4Revenue') state[k]=0;
    });
    showSplash();
  };
}

function buildDecisionReview() {
  const d = state.decisions;
  const rows = [
    {
      label: 'Biosensor choice',
      choice: d.biosensor==='A'?'Custom ASIC ($14/unit, 1 supplier)':'Off-the-shelf ($8/unit, 5 suppliers)',
      impact: d.biosensor==='A'?'Added $6/unit material cost and created single-source supply risk. In Phase 4, any supplier event was harder to absorb.':'Saved $6/unit and gave you multi-source flexibility. Strongest cost/risk tradeoff in Phase 1.',
      good: d.biosensor==='B'
    },
    {
      label: 'Regulatory pathway',
      choice: d.pathway==='A'?'510(k) — correct for this device':'De Novo — unnecessary for this device class',
      impact: d.pathway==='A'?'Correct choice. 510(k) is the right tool for a Class II CGM with existing predicates.':'Added $300K cost and 6+ months for no strategic benefit. De Novo is for genuinely novel devices.',
      good: d.pathway==='A'
    },
    {
      label: 'Design lock timing',
      choice: d.designLock==='A'?'Locked immediately (Month 5)':'Optimized first (+3 months, $80K)',
      impact: d.designLock==='B'?'Correct. The 3-month DFM review reduces post-clearance change risk, which typically costs 5–10× more to fix after FDA clearance.':'Locking immediately saves 3 months but increases post-clearance change risk significantly.',
      good: d.designLock==='B'
    },
    {
      label: 'Assembly model',
      choice: d.assembly==='A'?'Fully manual (0.45 hrs/unit)':d.assembly==='B'?'Semi-automated (0.20 hrs/unit)':'Fully automated (0.08 hrs/unit)',
      impact: d.assembly==='B'?'Optimal for this stage. Halved labor hours vs. manual at a manageable CapEx.':d.assembly==='A'?'High labor cost per unit limits your margin at scale.':'Lowest per-unit cost but $1.2M CapEx and 8-month validation delay — only justified at >500K units/yr.',
      good: d.assembly==='B'
    },
    {
      label: 'Supplier strategy',
      choice: d.supplierStrategy==='B'?'Dual-source ($80K, +$0.80/unit)':'Single-source (no extra cost)',
      impact: d.supplierStrategy==='B'?'Best practice. The $80K qualification investment paid back the first time a supplier issue occurred. In Phase 4, you absorbed the event at zero cost.':'Single-sourcing saved $80K upfront but exposed you to full supply disruption risk. In Phase 4, a supplier event forced a costly response.',
      good: d.supplierStrategy==='B'
    },
    {
      label: 'QMS approach',
      choice: d.qms==='B'?'Robust QMS ($280K, $0.80/unit QC)':'Minimal QMS ($120K, $1.20/unit QC)',
      impact: d.qms==='B'?'Correct long-term. Automated in-line testing typically reduces field complaint rates 40–60%, saving $300–800 per avoided complaint handling event.':'Lower upfront cost, but higher complaint rate and QC cost per unit at scale. May create regulatory audit risk.',
      good: d.qms==='B'
    }
  ];

  return rows.map(r => `
    <div style="border-left:3px solid ${r.good?'var(--green)':'var(--amber)'};padding:10px 14px;margin-bottom:10px;border-radius:0 6px 6px 0;background:${r.good?'var(--green-bg)':'var(--amber-bg)'}">
      <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:${r.good?'var(--green)':'var(--amber)'};margin-bottom:4px">${r.label}</div>
      <div style="font-size:.82rem;font-weight:600;color:var(--slate);margin-bottom:3px">${r.choice}</div>
      <div style="font-size:.78rem;color:var(--slate-700);line-height:1.5">${r.impact}</div>
    </div>`).join('');
}

/* ════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════ */
showSplash();
</script>
</body>
</html>
