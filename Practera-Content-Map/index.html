<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BE695 Practera Content Map</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* Art direction: academic tool → focused, functional, warm
   Palette: warm beige surfaces, teal primary accent (Nexus)
   Typography: Instrument Serif display + Satoshi body
   Density: balanced — sidebar dense, main content generous */

:root, [data-theme="light"] {
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem;
  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f0ede8;
  --color-surface-dynamic: #e6e4df;
  --color-divider: #dcd9d5;
  --color-border: #d4d1ca;
  --color-text: #28251d;
  --color-text-muted: #6b6963;
  --color-text-faint: #bab9b4;
  --color-text-inverse: #f9f8f4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #daeae8;
  --color-orange: #c45f00;
  --color-orange-highlight: #fdf0e0;
  --color-blue: #006494;
  --color-blue-highlight: #daeaf3;
  --color-purple: #6b32a8;
  --color-purple-highlight: #ede0f9;
  --color-success: #437a22;
  --color-success-highlight: #ddf0cc;
  --color-warning: #7a4010;
  --color-warning-highlight: #fde8d0;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --sidebar-width: 300px;
  --font-body: 'Satoshi', 'Inter', sans-serif;
  --font-display: 'Instrument Serif', Georgia, serif;
}

[data-theme="dark"] {
  --color-bg: #171614;
  --color-surface: #1c1b19;
  --color-surface-2: #201f1d;
  --color-surface-offset: #1d1c1a;
  --color-surface-dynamic: #2d2c2a;
  --color-divider: #262523;
  --color-border: #393836;
  --color-text: #cdccca;
  --color-text-muted: #929088;
  --color-text-faint: #5a5957;
  --color-text-inverse: #2b2a28;
  --color-primary: #4f98a3;
  --color-primary-hover: #227f8b;
  --color-primary-highlight: #1a3333;
  --color-orange: #fdab43;
  --color-orange-highlight: #3a2e1a;
  --color-blue: #5591c7;
  --color-blue-highlight: #192533;
  --color-purple: #a86fdf;
  --color-purple-highlight: #251840;
  --color-success: #6daa45;
  --color-success-highlight: #1a2e10;
  --color-warning: #e8a050;
  --color-warning-highlight: #302010;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
    --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
    --color-divider: #262523; --color-border: #393836;
    --color-text: #cdccca; --color-text-muted: #929088; --color-text-faint: #5a5957;
    --color-text-inverse: #2b2a28;
    --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #1a3333;
    --color-orange: #fdab43; --color-orange-highlight: #3a2e1a;
    --color-blue: #5591c7; --color-blue-highlight: #192533;
    --color-purple: #a86fdf; --color-purple-highlight: #251840;
    --color-success: #6daa45; --color-success-highlight: #1a2e10;
    --color-warning: #e8a050; --color-warning-highlight: #302010;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base);
  color: var(--color-text); background: var(--color-bg);
  display: flex; flex-direction: column; overflow: hidden; height: 100dvh;
}
img { display: block; max-width: 100%; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input, select { font: inherit; color: inherit; }
a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: var(--radius-sm); }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* === LAYOUT === */
.app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

/* HEADER */
.header {
  display: flex; align-items: center; gap: var(--space-4);
  padding: var(--space-3) var(--space-4);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0; z-index: 10;
}
.header-logo {
  display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0;
  font-family: var(--font-display); font-size: 1.1rem; font-style: italic;
  color: var(--color-text);
}
.header-logo svg { color: var(--color-primary); }
.header-search {
  flex: 1; display: flex; align-items: center; gap: var(--space-2);
  background: var(--color-bg); border: 1px solid var(--color-border);
  border-radius: var(--radius-full); padding: var(--space-2) var(--space-4);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.header-search:focus-within {
  border-color: var(--color-primary); box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-primary) 15%, transparent);
}
.header-search svg { color: var(--color-text-faint); flex-shrink: 0; }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: var(--text-sm); color: var(--color-text);
}
.search-input::placeholder { color: var(--color-text-faint); }
.search-clear {
  color: var(--color-text-faint); padding: 2px;
  border-radius: var(--radius-sm); display: none;
  transition: color var(--transition);
}
.search-clear:hover { color: var(--color-text); }
.search-clear.visible { display: flex; }
.header-actions { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }
.icon-btn {
  width: 36px; height: 36px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted); transition: background var(--transition), color var(--transition);
}
.icon-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
.result-count {
  font-size: var(--text-xs); color: var(--color-text-faint); white-space: nowrap;
}

/* BODY */
.body { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-width); flex-shrink: 0;
  background: var(--color-surface); border-right: 1px solid var(--color-border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform var(--transition);
}
.sidebar-header {
  padding: var(--space-4) var(--space-4) var(--space-3);
  border-bottom: 1px solid var(--color-divider); flex-shrink: 0;
}
.sidebar-header h2 {
  font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted);
  text-transform: uppercase; letter-spacing: 0.07em;
}
.sidebar-body { flex: 1; overflow-y: auto; padding: var(--space-2) 0; }
.sidebar-body::-webkit-scrollbar { width: 4px; }
.sidebar-body::-webkit-scrollbar-track { background: transparent; }
.sidebar-body::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

/* Filters panel */
.filter-panel {
  padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
}
.filter-label {
  font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted);
  text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: var(--space-2);
}
.filter-chips { display: flex; flex-wrap: wrap; gap: var(--space-1); }
.chip {
  font-size: var(--text-xs); padding: 3px 10px; border-radius: var(--radius-full);
  border: 1px solid var(--color-border); background: var(--color-surface-2);
  color: var(--color-text-muted); cursor: pointer;
  transition: all var(--transition);
}
.chip:hover { border-color: var(--color-primary); color: var(--color-primary); }
.chip.active {
  background: var(--color-primary); border-color: var(--color-primary);
  color: var(--color-text-inverse); font-weight: 500;
}

/* Tree */
.tree-milestone {
  padding: 0;
}
.tree-ms-header {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4); cursor: pointer;
  transition: background var(--transition);
  border-radius: 0;
}
.tree-ms-header:hover { background: var(--color-surface-offset); }
.tree-ms-header.active-ms { background: var(--color-primary-highlight); }
.tree-ms-chevron {
  color: var(--color-text-faint); flex-shrink: 0; transition: transform 180ms ease;
}
.tree-ms-chevron.open { transform: rotate(90deg); }
.tree-ms-name {
  font-size: var(--text-sm); font-weight: 600; color: var(--color-text);
  flex: 1; line-height: 1.3;
}
.tree-ms-count {
  font-size: var(--text-xs); color: var(--color-text-faint); flex-shrink: 0;
}
.tree-activities { display: none; }
.tree-activities.open { display: block; }
.tree-activity {
  display: flex; align-items: flex-start; gap: var(--space-2);
  padding: var(--space-1) var(--space-4) var(--space-1) calc(var(--space-4) + var(--space-6));
  cursor: pointer; transition: background var(--transition);
}
.tree-activity:hover { background: var(--color-surface-offset); }
.tree-activity.active { background: var(--color-primary-highlight); }
.tree-act-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--color-text-faint); margin-top: 7px; flex-shrink: 0;
}
.tree-act-name {
  font-size: var(--text-xs); color: var(--color-text-muted); line-height: 1.4; flex: 1;
}
.tree-activity.active .tree-act-dot { background: var(--color-primary); }
.tree-activity.active .tree-act-name { color: var(--color-primary); font-weight: 500; }

/* MAIN */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }

/* View toggle */
.view-bar {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3) var(--space-6); border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0; background: var(--color-surface);
}
.view-tabs { display: flex; gap: var(--space-1); background: var(--color-surface-offset); border-radius: var(--radius-md); padding: 3px; }
.view-tab {
  font-size: var(--text-xs); font-weight: 500; padding: 5px 14px;
  border-radius: calc(var(--radius-md) - 3px);
  color: var(--color-text-muted); cursor: pointer;
  transition: all var(--transition);
}
.view-tab.active { background: var(--color-surface-2); color: var(--color-text); box-shadow: var(--shadow-sm); }
.view-bar-spacer { flex: 1; }
.sort-select {
  font-size: var(--text-xs); padding: 5px 10px;
  background: var(--color-surface-2); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); color: var(--color-text-muted);
  cursor: pointer; outline: none;
}

/* Results */
.results-area { flex: 1; padding: var(--space-4) var(--space-6); }

/* Browse view: grouped by milestone/activity */
.browse-milestone {
  margin-bottom: var(--space-8);
}
.browse-ms-title {
  font-family: var(--font-display); font-size: var(--text-lg);
  font-style: italic; color: var(--color-text);
  margin-bottom: var(--space-4); padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--color-divider);
  display: flex; align-items: baseline; gap: var(--space-3);
}
.ms-badge {
  font-family: var(--font-body); font-size: var(--text-xs); font-style: normal;
  font-weight: 600; padding: 2px 8px; border-radius: var(--radius-full);
  background: var(--color-primary-highlight); color: var(--color-primary);
}
.browse-activity { margin-bottom: var(--space-6); }
.browse-act-header {
  display: flex; align-items: center; gap: var(--space-2);
  margin-bottom: var(--space-3); cursor: pointer;
}
.browse-act-name {
  font-size: var(--text-sm); font-weight: 600; color: var(--color-text);
}
.browse-act-counts {
  font-size: var(--text-xs); color: var(--color-text-faint);
}
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
  gap: var(--space-3);
}

/* Item card */
.item-card {
  background: var(--color-surface);
  border: 1px solid oklch(from var(--color-text) l c h / 0.09);
  border-radius: var(--radius-lg); padding: var(--space-4);
  cursor: default; transition: box-shadow var(--transition), transform var(--transition);
  display: flex; flex-direction: column; gap: var(--space-2);
}
.item-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.item-card-top { display: flex; align-items: flex-start; gap: var(--space-2); }
.item-type-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: var(--text-xs); font-weight: 600; padding: 3px 8px;
  border-radius: var(--radius-full); flex-shrink: 0;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.badge-reading { background: var(--color-surface-offset); color: var(--color-text-muted); }
.badge-video { background: var(--color-orange-highlight); color: var(--color-orange); }
.badge-reflection { background: var(--color-blue-highlight); color: var(--color-blue); }
.badge-moderated { background: var(--color-purple-highlight); color: var(--color-purple); }
.badge-team360 { background: var(--color-success-highlight); color: var(--color-success); }
.badge-survey { background: var(--color-warning-highlight); color: var(--color-warning); }
.team-tag {
  font-size: var(--text-xs); padding: 3px 8px; border-radius: var(--radius-full);
  background: var(--color-surface-offset); color: var(--color-text-faint);
  font-weight: 500;
}
.item-title {
  font-size: var(--text-sm); font-weight: 600; color: var(--color-text);
  line-height: 1.35;
}
.item-desc {
  font-size: var(--text-xs); color: var(--color-text-muted); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.item-breadcrumb {
  font-size: var(--text-xs); color: var(--color-text-faint);
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-top: auto;
}
.item-breadcrumb span { color: var(--color-text-muted); }
.item-actions { display: flex; align-items: center; gap: var(--space-2); margin-top: var(--space-1); }
.item-link {
  font-size: var(--text-xs); color: var(--color-primary);
  display: inline-flex; align-items: center; gap: 4px;
  transition: color var(--transition);
}
.item-link:hover { color: var(--color-primary-hover); text-decoration: none; }
.file-tag {
  font-size: var(--text-xs); padding: 2px 8px; border-radius: var(--radius-full);
  background: var(--color-surface-offset); color: var(--color-text-muted);
  border: 1px solid var(--color-border);
  display: inline-flex; align-items: center; gap: 4px;
}

/* Search highlight */
mark { background: oklch(from var(--color-orange) l c h / 0.25); border-radius: 2px; padding: 0 1px; }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: var(--space-12) var(--space-8); color: var(--color-text-muted);
}
.empty-state svg { color: var(--color-text-faint); margin-bottom: var(--space-4); }
.empty-state h3 { color: var(--color-text); margin-bottom: var(--space-2); font-size: var(--text-base); }
.empty-state p { font-size: var(--text-sm); max-width: 36ch; }

/* Sidebar toggle on mobile */
.sidebar-toggle {
  display: none; width: 36px; height: 36px; border-radius: var(--radius-md);
  align-items: center; justify-content: center; color: var(--color-text-muted);
  transition: background var(--transition);
}
.sidebar-toggle:hover { background: var(--color-surface-offset); }

@media (max-width: 768px) {
  .sidebar { position: absolute; top: 0; left: 0; height: 100%; z-index: 20; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: oklch(0 0 0 / 0.4); z-index: 19; }
  .sidebar-overlay.open { display: block; }
  .sidebar-toggle { display: flex; }
  .results-area { padding: var(--space-4); }
}

.activity-toggle-row { display: flex; align-items: center; justify-content: space-between; }

/* ── External links & Practera button ── */
.item-links {
  display: flex; flex-wrap: wrap; gap: var(--space-1); margin-top: var(--space-2);
}
.item-link-ext {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: var(--text-xs); color: var(--color-primary); text-decoration: none;
  padding: 2px 8px; border-radius: var(--radius-full);
  border: 1px solid oklch(from var(--color-primary) l c h / 0.3);
  background: var(--color-primary-highlight);
  white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  transition: background var(--transition-interactive), color var(--transition-interactive);
}
.item-link-ext:hover { background: var(--color-primary); color: var(--color-text-inverse); }
.practera-btn {
  display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0; margin-left: auto;
  font-size: var(--text-xs); font-weight: 600; text-decoration: none;
  color: var(--color-text-inverse); background: var(--color-primary);
  padding: 3px 9px; border-radius: var(--radius-full); white-space: nowrap;
  transition: background var(--transition-interactive);
}
.practera-btn:hover { background: var(--color-primary-hover); }

</style>
</head>
<body>
<div class="app" id="app">
  <!-- HEADER -->
  <header class="header">
    <button class="sidebar-toggle icon-btn" id="sidebarToggle" aria-label="Toggle sidebar">
      <i data-lucide="panel-left" width="18" height="18"></i>
    </button>
    <div class="header-logo">
      <svg aria-label="Practera Map" viewBox="0 0 28 28" width="26" height="26" fill="none">
        <rect x="2" y="2" width="11" height="11" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
        <rect x="15" y="2" width="11" height="11" rx="2.5" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.8"/>
        <rect x="2" y="15" width="11" height="11" rx="2.5" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.8"/>
        <rect x="15" y="15" width="11" height="11" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      Content Map
    </div>
    <div class="header-search">
      <i data-lucide="search" width="16" height="16"></i>
      <input type="text" class="search-input" id="searchInput"
             placeholder="Search activities, topics, assessments…" autocomplete="off">
      <button class="search-clear" id="searchClear" aria-label="Clear search">
        <i data-lucide="x" width="14" height="14"></i>
      </button>
    </div>
    <div class="header-actions">
      <span class="result-count" id="resultCount"></span>
      <button class="icon-btn" id="themeToggle" data-theme-toggle aria-label="Switch theme">
        <i data-lucide="sun" width="18" height="18"></i>
      </button>
    </div>
  </header>

  <div class="body">
    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Course Structure</h2>
      </div>
      <!-- Filters -->
      <div class="filter-panel">
        <div class="filter-label">Type</div>
        <div class="filter-chips" id="typeFilters">
          <button class="chip active" data-filter="type" data-value="all">All</button>
          <button class="chip" data-filter="type" data-value="topic">Topics</button>
          <button class="chip" data-filter="type" data-value="assessment">Assessments</button>
        </div>
        <div class="filter-label" style="margin-top:var(--space-3)">Subtype</div>
        <div class="filter-chips" id="subtypeFilters">
          <button class="chip active" data-filter="subtype" data-value="all">All</button>

 early digital health&nbsp;application. Things are very different now! Glooko Inc. is a widely respected digital health pioneer; it was one of the first companies to leverage digital technology to improve care for a chronic disease. Founded by technology en", "content": "Background It was 2010. Originally from India, Dalal’s South Asian heritage and age were working against him, and he had recently been diagnosed as pre-diabetic. “My doctor told me to make lifestyle c", "video_link": "", "story_type": "topic", "order": 2, "files": [], "activity_id": "d2fe4637-5c26-4926-b694-f9764925d1ca", "links": []}, {"idx": 44, "id": "3d027d87-a1f0-4b7d-ac66-7e28013c45b3", "type": "topic", "title": "Need Statements  (Lecture)", "summary": "", "content": "", "video_link": "", "story_type": "topic", "order": 4, "files": [{"name": "8F - Need Statements, Scoping.pdf", "type": "application/pdf", "ext": ".pdf"}], "activity_id": "d2fe4637-5c26-4926-b694-f9764925d1ca", "links": []}], "assessments": [{"idx": 43, "id": "544285fd-cab9-4b3e-848c-5c70e54933db", "type": "assessment", "title": "Need Statement - Worksheet", "description": "In this worksheet, you will get some practice with writing, scoping, and critiquing need statements. There are three parts to this activity: first , you will complete your own worksheet, including the questions about the Case Study; second , you will provide feedback to a fellow student (on the Case", "assessment_type": "moderated", "is_team": false, "score_type": "hidden", "order": 3, "files": [], "activity_id": "d2fe4637-5c26-4926-b694-f9764925d1ca", "links": []}]}, {"id": "dd436da3-911a-4361-aa61-4b25d2bbd69c", "name": "Intro to Business Model Canvas, Value Proposition Canvas", "description": "We use Lean principles and specifically the concepts of the Business Model Canvas and the Value Proposition Canvas, two tools your team will be using to develop and test your ideas and concepts. This semester we will focus on the VPC and how it relates the Need Statement you crafted to what your 'customers' care about. To check off this activity, please complete the following: (1) Value Propositio", "order": 7, "topics": [{"idx": 46, "id": "e0f4bf54-dfd8-4262-bbe1-6ef87292583d", "type": "topic", "title": "BMC, VPC (Lecture)", "summary": "", "content": "", "video_link": "", "story_type": "topic", "order": 2, "files": [{"name": "9F - BMC, VPC.pdf", "type": "application/pdf", "ext": ".pdf"}], "activity_id": "dd436da3-911a-4361-aa61-4b25d2bbd69c", "links": []}, {"idx": 47, "id": "078b1de5-6e02-44db-a92b-42e896b8049f", "type": "topic", "title": "Lean Tools: Business Model Canvas", "summary": "The Lean LaunchPad methodology uses the Business Model Canvas to visualise and test business and innovation hypothesis. This video provides a brief overview of the canvas that we will revisit in detail later in the NEXT innovation accelerator", "content": "https://youtu.be/QoAOzMTLP5s", "video_link": "https://youtu.be/QoAOzMTLP5s", "story_type": "topic", "order": 3, "files": [{"name": "businesss_model_canvas_2.jpg", "type": "image/jpeg", "ext": ".jpg"}], "activity_id": "dd436da3-911a-4361-aa61-4b25d2bbd69c", "links": [{"href": "https://youtu.be/QoAOzMTLP5s", "label": "youtu.be"}]}, {"idx": 48, "id": "c44d908c-a18a-4e4b-bf59-cda782413cf0", "type": "topic", "title": "Unmet Needs and Customer Segmentation (Lecture)", "summary": "", "content": "", "video_link": "", "story_type": "topic", "order": 4, "files": [{"name": "10F - Unmet Needs and Customer Segmentation - 2025.pdf", "type": "application/pdf", "ext": ".pdf"}], "activity_id": "dd436da3-911a-4361-aa61-4b25d2bbd69c", "links": []}], "assessments": [{"idx": 45, "id": "9a0ca2a0-7a30-40ab-9951-4bcbe973485b", "type": "assessment", "title": "Value Prop Canvas - Worksheet", "description": "In this worksheet, you will get some practice with the concepts of a Business Model Canvas and a Value Proposition Canvas.We will again use the in-class FigJams.", "assessment_type": "moderated", "is_team": false, " ust need to enter each one.", "assessment_type": "moderated", "is_team": true, "score_type": "hidden", "order": 6, "files": [], "activity_id": "82dcae03-7235-435d-ae07-6e0880ba9dd5", "links": []}, {"idx": 55, "id": "178ecd53-cac8-4616-9644-0d3be385bd64", "type": "assessment", "title": "First look at your BINDER", "description": "These are the instructions for your final BINDER deliverable, FYI. You can start it today, by creating the required folders, filing your clinical observations and anything else you already have in the first few folders. Binder guidance 2025 Binder sections:Clinical Challenges and User Needs 1-1 Devi", "assessment_type": "moderated", "is_team": true, "score_type": "percentage", "order": 7, "files": [], "activity_id": "82dcae03-7235-435d-ae07-6e0880ba9dd5", "links": []}]}, {"id": "e264ec42-3ea8-4117-85d3-862bab7188ff", "name": "Collaboration Skills - First Feedback Loop", "description": "Welcome to the next Collaboration Skills Development phase. Here, you will self-assess your collaboration, peer assess your team members, receive their feedback on your collaboration skills and reflect on it before adjusting your skill development plan.", "order": 9, "topics": [{"idx": 56, "id": "c15b1ad6-642f-4aff-8827-191196b4fbc6", "type": "topic", "title": "Skill Development - Part Two", "summary": "", "content": "Congratulations, your team has worked hard to identify 12 potential clinical challenges. As we discuss the merits of pursuing any one of them, please take some time to reflect on your Team Project so ", "video_link": "", "story_type": "topic", "order": 1, "files": [], "activity_id": "e264ec42-3ea8-4117-85d3-862bab7188ff", "links": []}, {"idx": 57, "id": "8bff28a2-759e-4cb5-8615-8ffa83881f29", "type": "topic", "title": "How to give Effective Feedback", "summary": "Later in this activity, you will be asked to do a peer assessment and provide constructive feedback on teamwork skills of a team member. This video provides some tips on how to give cons one in your cohort has completed their self and peer review you will be able to click a button in Practera and generate a report that looks like this for each of your students. Your students", "video_link": "", "story_type": "topic", "order": 3, "files": [], "activity_id": "4af2ea2e-b8be-4611-8877-8783f815cb61", "links": []}, {"idx": 103, "id": "f665909e-2c39-427f-8a36-e4f1c69a1112", "type": "topic", "title": "Tips For Skill Development", "summary": "", "content": "Part of the skill development plan submission is selected which skill you are rated the highest and lowest by your peers. When a development plan is submitted it triggers content to unlock based on wh", "video_link": "", "story_type": "topic", "order": 4, "files": [], "activity_id": "4af2ea2e-b8be-4611-8877-8783f815cb61", "links": []}], "assessments": [{"idx": 101, "id": "e927d049-d323-4b54-badd-3f732d620a05", "type": "assessment", "title": "BE 695 2nd Self & Peer Assessment", "description": "In this submission, you will self- assess your collaboration skills again and provide an assessment of your team members collaboration skills in the 3rd phase of your project.&nbsp;", "assessment_type": "team360", "is_team": false, "score_type": "hidden", "order": 2, "files": [], "activity_id": "4af2ea2e-b8be-4611-8877-8783f815cb61", "links": []}, {"idx": 104, "id": "1e931f05-74fb-45ad-bf67-c5cde1b6f000", "type": "assessment", "title": "BE695 Development Plan - 2", "description": "Now that you have done your self and peer assessment indicate which skills you plan to focus on developing in the next phase.", "assessment_type": "moderated", "is_team": false, "score_type": "hidden", "order": 5, "files": [], "activity_id": "4af2ea2e-b8be-4611-8877-8783f815cb61", "links": []}]}]}, {"id": "470d7923-c574-4861-8649-5f25d727d342", "name": "Initial Prototype - Defining and Making It", "description": "(there are&nbsp; six activities in this milestone) [BINDER Sections:&nbsp; Engineering Specifications ; Design For Manufacturing; // === STATE ===
let state = {
  query: '',
  typeFilter: 'all',
  subtypeFilter: 'all',
  milestoneFilter: null,
  activityFilter: null,
  view: 'browse',  // 'browse' | 'search'
  openMilestones: new Set(CONTENT_MAP.map(m => m.id)),
};

// === HELPERS ===
function stripHtml(str) {
  return str ? str.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() : '';
}

function highlight(text, query) {
  if (!query || !text) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function getBadgeClass(item) {
  if (item.type === 'topic') return item.subtype === 'video' ? 'badge-video' : 'badge-reading';
  const map = { reflection: 'badge-reflection', moderated: 'badge-moderated', team360: 'badge-team360', survey: 'badge-survey' };
  return map[item.subtype] || 'badge-reading';
}

function getLabel(item) {
  if (item.type === 'topic') return item.subtype === 'video' ? 'Video' : 'Reading';
  const map = { reflection: 'Worksheet', moderated: 'Submission', team360: '360 Eval', survey: 'Survey' };
  return map[item.subtype] || item.subtype || 'Content';
}

function getIcon(item) {
  if (item.type === 'topic') return item.subtype === 'video' ? 'play-circle' : 'file-text';
  const map = { reflection: 'pen-line', moderated: 'send', team360: 'users', survey: 'bar-chart-2' };
  return map[item.subtype] || 'file';
}

function matchesFilters(item) {
  if (state.typeFilter !== 'all' && item.type !== state.typeFilter) return false;
  if (state.subtypeFilter !== 'all' && item.subtype !== state.subtypeFilter) return false;
  if (state.milestoneFilter && item.milestone !== state.milestoneFilter) return false;
  if (state.activityFilter && item.activity !== state.activityFilter) return false;
  return true;
}

function matchesQuery(item) {
  if (!state.query) return true;
  const q = state.query.toLowerCase();
  return (
    item.title.toLowerCase().includes(q) ||
    (item.description || '').toLowerCase().includes(q) ||
    item.milestone.toLowerCase().includes(q) ||
    item.activity.toLowerCase().includes(q)
  );
}

function getFilteredItems() {
  return ALL_ITEMS.filter(item => matchesFilters(item) && matchesQuery(item));
}

// === RENDER ITEM CARD ===
function renderCard(item, showBreadcrumb = true) {
  const badgeClass = getBadgeClass(item);
  const label = getLabel(item);
  const icon = getIcon(item);
  const title = highlight(item.title, state.query);
  const desc = item.description ? highlight(item.description.substring(0, 180) + (item.description.length > 180 ? '…' : ''), state.query) : '';

  const teamTag = item.is_team ? `<span class="team-tag">Team</span>` : '';

  const breadcrumb = showBreadcrumb ? `
    <div class="item-breadcrumb">
      <span>${highlight(item.milestone, state.query)}</span>
      <i data-lucide="chevron-right" width="10" height="10"></i>
      <span>${highlight(item.activity, state.query)}</span>
    </div>
  ` : '';

  const videoLink = item.video_link ? `
    <a class="item-link" href="${item.video_link}" target="_blank" rel="noopener noreferrer">
      <i data-lucide="external-link" width="12" height="12"></i>Watch
    </a>
  ` : '';

  const fileTags = item.files && item.files.length > 0 ? item.files.slice(0, 3).map(f => `
    <span class="file-tag">
      <i data-lucide="paperclip" width="10" height="10"></i>${f.name.substring(0, 20)}${f.name.length > 20 ? '…' : ''}
    </span>
  `).join('') : '';

  const actions = (videoLink || fileTags) ? `
    <div class="item-actions" style="flex-wrap:wrap; gap:var(--space-1)">
      ${videoLink}${fileTags}
    </div>
  ` : '';

  const extLinks = (item.links && item.links.length > 0) ? `
    <div class="item-links">
      ${item.links.map(lnk =>
        `<a class="item-link-ext" href="${lnk.href.replace(/"/g,'&quot;')}" target="_blank" rel="noopener noreferrer" title="${lnk.href.replace(/"/g,'&quot;')}"><i data-lucide="link" width="10" height="10"></i>${lnk.label.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</a>`
      ).join('')}
    </div>
  ` : '';

  const practeraBtn = item.activity_id ? `<a class="practera-btn" href="https://app.practera.com/v2/activity-mobile-v2?id=${item.activity_id}" target="_blank" rel="noopener noreferrer"><i data-lucide="arrow-up-right" width="10" height="10"></i>Open in Practera</a>` : '';

  return `
    <div class="item-card">
      <div class="item-card-top" style="flex-wrap:wrap; gap:var(--space-1);">
        <span class="item-type-badge ${badgeClass}">
          <i data-lucide="${icon}" width="10" height="10"></i>
          ${label}
        </span>
        ${teamTag}
        ${practeraBtn}
      </div>
      <div class="item-title">${title}</div>
      ${desc ? `<div class="item-desc">${desc}</div>` : ''}
      ${breadcrumb}
      ${extLinks}
      ${actions}
    </div>
  `;
}

// === RENDER BROWSE VIEW ===
function renderBrowse() {
  const filtered = getFilteredItems();
  const area = document.getElementById('resultsArea');

  if (filtered.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <i data-lucide="search-x" width="40" height="40"></i>
        <h3>Nothing found</h3>
        <p>Try adjusting your filters or search query.</p>
      </div>`;
    lucide.createIcons();
    return;
  }

  // Group by milestone then activity
  const grouped = {};
  for (const ms of CONTENT_MAP) {
    for (const act of ms.activities) {
      const actItems = filtered.filter(i => i.milestone === ms.name && i.activity === act.name);
      if (actItems.length === 0) continue;
      if (!grouped[ms.name]) grouped[ms.name] = { order: ms.order, activities: {} };
      grouped[ms.name].activities[act.name] = { order: act.order, items: actItems };
    }
  }

  let html = '';
  const msEntries = Object.entries(grouped).sort((a,b) => a[1].order - b[1].order);

  for (const [msName, msData] of msEntries) {
    const totalItems = Object.values(msData.activities).reduce((s, a) => s + a.items.length, 0);
    html += `
      <div class="browse-milestone">
        <div class="browse-ms-title">
          ${highlight(msName, state.query)}
          <span class="ms-badge">${totalItems} item${totalItems !== 1 ? 's' : ''}</span>
        </div>
    `;

    const actEntries = Object.entries(msData.activities).sort((a,b) => a[1].order - b[1].order);
    for (const [actName, actData] of actEntries) {
      html += `
        <div class="browse-activity">
          <div class="browse-act-header">
            <div class="browse-act-name">${highlight(actName, state.query)}</div>
            <span class="browse-act-counts">${actData.items.length} item${actData.items.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="items-grid">
            ${actData.items.map(i => renderCard(i, false)).join('')}
          </div>
        </div>
      `;
    }
    html += '</div>';
  }

  area.innerHTML = html;
  lucide.createIcons();
  updateCount(filtered.length);
}

// === RENDER SEARCH VIEW ===
function renderSearch() {
  const filtered = getFilteredItems();
  const area = document.getElementById('resultsArea');

  if (filtered.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <i data-lucide="search-x" width="40" height="40"></i>
        <h3>Nothing found</h3>
        <p>Try a different search term or clear your filters.</p>
      </div>`;
    lucide.createIcons();
    updateCount(0);
    return;
  }

  const html = `<div class="items-grid">${filtered.map(i => renderCard(i, true)).join('')}</div>`;
  area.innerHTML = html;
  lucide.createIcons();
  updateCount(filtered.length);
}

function render() {
  if (state.view === 'browse') renderBrowse();
  else renderSearch();
}

function updateCount(n) {
  const total = ALL_ITEMS.filter(matchesFilters).length;
  const el = document.getElementById('resultCountMain');
  if (state.query) {
    el.textContent = `${n} of ${total} match`;
  } else {
    el.textContent = `${total} item${total !== 1 ? 's' : ''}`;
  }
}

// === SIDEBAR TREE ===
function renderTree() {
  const tree = document.getElementById('sidebarTree');
  let html = '';

  for (const ms of CONTENT_MAP) {
    const isOpen = state.openMilestones.has(ms.id);
    const totalAct = ms.activities.length;
    const isActiveMilestone = state.milestoneFilter === ms.name;

    html += `
      <div class="tree-milestone">
        <div class="tree-ms-header ${isActiveMilestone ? 'active-ms' : ''}" 
             data-ms-id="${ms.id}" data-ms-name="${encodeURIComponent(ms.name)}">
          <i data-lucide="chevron-right" width="14" height="14" 
             class="tree-ms-chevron ${isOpen ? 'open' : ''}"></i>
          <span class="tree-ms-name">${ms.name}</span>
          <span class="tree-ms-count">${totalAct}</span>
        </div>
        <div class="tree-activities ${isOpen ? 'open' : ''}">
    `;

    for (const act of ms.activities) {
      const isActiveAct = state.activityFilter === act.name;
      html += `
        <div class="tree-activity ${isActiveAct ? 'active' : ''}"
             data-act-name="${encodeURIComponent(act.name)}" data-ms-name="${encodeURIComponent(ms.name)}">
          <div class="tree-act-dot"></div>
          <span class="tree-act-name">${act.name}</span>
        </div>
      `;
    }

    html += '</div></div>';
  }

  tree.innerHTML = html;
  lucide.createIcons();

  // Bind clicks
  tree.querySelectorAll('.tree-ms-header').forEach(el => {
    el.addEventListener('click', () => {
      const msId = el.dataset.msId;
      const msName = decodeURIComponent(el.dataset.msName);
      if (state.openMilestones.has(msId)) {
        state.openMilestones.delete(msId);
      } else {
        state.openMilestones.add(msId);
      }
      // Filter by milestone (toggle)
      if (state.milestoneFilter === msName) {
        state.milestoneFilter = null;
        state.activityFilter = null;
      } else {
        state.milestoneFilter = msName;
        state.activityFilter = null;
      }
      renderTree();
      render();
    });
  });

  tree.querySelectorAll('.tree-activity').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const actName = decodeURIComponent(el.dataset.actName);
      const msName = decodeURIComponent(el.dataset.msName);
      if (state.activityFilter === actName) {
        state.activityFilter = null;
        state.milestoneFilter = null;
      } else {
        state.activityFilter = actName;
        state.milestoneFilter = msName;
      }
      renderTree();
      render();
    });
  });
}

// === EVENT LISTENERS ===
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', () => {
  state.query = searchInput.value;
  searchClear.classList.toggle('visible', !!state.query);
  if (state.query) {
    state.view = 'search';
    document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'search'));
  }
  render();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  state.query = '';
  searchClear.classList.remove('visible');
  state.view = 'browse';
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'browse'));
  render();
});

// Filter chips
document.getElementById('typeFilters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#typeFilters .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  state.typeFilter = chip.dataset.value;
  render();
});

document.getElementById('subtypeFilters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#subtypeFilters .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  state.subtypeFilter = chip.dataset.value;
  render();
});

// View tabs
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    state.view = tab.dataset.view;
    document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t === tab));
    render();
  });
});

// Theme toggle
(function(){
  const toggle = document.getElementById('themeToggle');
  const root = document.documentElement;
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', d);
  updateToggleIcon(d);
  toggle.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', d);
    updateToggleIcon(d);
  });
  function updateToggleIcon(theme) {
    toggle.innerHTML = theme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
})();

// Sidebar toggle (mobile)
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});

// === INIT ===
renderTree();
render();
</script>
</body>
</html>
